<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 背景圆形 -->
  <circle cx="50" cy="50" r="48" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
  
  <!-- 小车主体 -->
  <rect x="25" y="40" width="50" height="20" rx="3" fill="white"/>
  
  <!-- 车顶 -->
  <path d="M30 40 L35 30 L65 30 L70 40" fill="white"/>
  
  <!-- 车窗 -->
  <path d="M38 32 L62 32 L62 38 L38 38" fill="#e0f2fe"/>
  
  <!-- 车轮 -->
  <circle cx="35" cy="60" r="8" fill="#1f2937"/>
  <circle cx="65" cy="60" r="8" fill="#1f2937"/>
  <circle cx="35" cy="60" r="4" fill="#4b5563"/>
  <circle cx="65" cy="60" r="4" fill="#4b5563"/>
  
  <!-- 车灯 -->
  <circle cx="28" cy="45" r="3" fill="#fbbf24"/>
  <circle cx="72" cy="45" r="3" fill="#fbbf24"/>
  
  <!-- 天线 -->
  <line x1="50" y1="30" x2="50" y2="20" stroke="#94a3b8" stroke-width="1"/>
  <circle cx="50" cy="20" r="2" fill="#94a3b8"/>
  
  <!-- 装饰线条 -->
  <line x1="25" y1="50" x2="75" y2="50" stroke="#dbeafe" stroke-width="1"/>
  <circle cx="50" cy="45" r="2" fill="#1d4ed8"/>
</svg>